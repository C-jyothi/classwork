<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        h3{
            text-align:right;
            color:rgb(137, 19, 211);
            font-family: sans-serif;
            font-size: 25px;
        }

        .welcome{
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            word-spacing: 4px;
            color:rgb(236, 13, 195);
        }

        table {
            border-collapse: collapse;
            width:60%;
            margin: 20px auto;
        }

        table,th,td {
            border: 1px solid black;
        }

        th, td {
            vertical-align: middle;
            text-align: center;
            padding: 10px;
        }

        a{
            text-decoration: none;
            color:blue;
        }

        a:hover{
            color:red;
        }
    </style>
</head>

<body>

    <h3>
        <i class="bi bi-cup-hot"></i>
        Spice Garden Restaurant
        <i class="bi bi-egg-fried"></i>
    </h3>

    <p class="welcome">welcome to our cafe</p>

    <table>
        <tr>
            <th>Menu</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Pizza</td>
            <td>Rs 12.99</td>
        </tr>
        <tr>
            <td>Hamburger</td>
            <td>Rs 9.99</td>
        </tr>
        <tr>
            <td>Coffee</td>
            <td>Rs 5.99</td>
        </tr>
    </table>

    <p style="text-align:center;">
        <a href="#">Contact Us</a>
    </p>

</body>
</html>
